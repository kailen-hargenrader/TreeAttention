[project]
name = "treeattn-torch"
version = "0.1.0"
description = "Pure-PyTorch hierarchical (tree) attention kernels (deterministic + stochastic)."
requires-python = ">=3.11,<3.12"
dependencies = [
    "torch==2.7.1",
    "einops",
]

[build-system]
requires = ["uv_build>=0.11.15,<0.12.0"]
build-backend = "uv_build"
