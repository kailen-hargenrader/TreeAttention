[project]
name = "treeattn-jax"
version = "0.1.0"
description = "JAX-backed hierarchical (tree) attention kernels with a PyTorch bridge (deterministic + stochastic, causal + non-causal)."
requires-python = ">=3.11,<3.12"
dependencies = [
    "torch==2.7.1",
    # CUDA-enabled JAX. The cudnn version conflict with torch 2.7.1+cu126
    # (which pins nvidia-cudnn-cu12==9.5.1.17) is resolved at the workspace
    # root via tool.uv.override-dependencies (pinning cudnn>=9.8).
    "jax[cuda12]>=0.6",
    "einops",
    "equinox",
]

[build-system]
requires = ["uv_build>=0.11.15,<0.12.0"]
build-backend = "uv_build"
